<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded Square Background -->
  <rect width="64" height="64" rx="16" fill="#ffffff" />
  
  <!-- "Council" Composition: 1 Human, 4 Robots (Adjusted to prevent collisions) -->
  <g stroke="#111111" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Outer Robots (Level 3) -->
    <g stroke-width="2">
      <path d="M2 58 a6 6 0 0 1 8 -6" />
      <rect x="2.5" y="36" width="7.5" height="7.5" rx="1.5" fill="#ffffff" />
      <circle cx="5" cy="40" r="0.8" fill="#111111" stroke="none" />
      <circle cx="7.5" cy="40" r="0.8" fill="#111111" stroke="none" />
      
      <path d="M62 58 a6 6 0 0 0 -8 -6" />
      <rect x="54" y="36" width="7.5" height="7.5" rx="1.5" fill="#ffffff" />
      <circle cx="56.5" cy="40" r="0.8" fill="#111111" stroke="none" />
      <circle cx="59" cy="40" r="0.8" fill="#111111" stroke="none" />
    </g>

    <!-- Inner Robots (Level 2) -->
    <g stroke-width="3">
      <path d="M11 58 a7 7 0 0 1 10 -7" />
      <rect x="11" y="28" width="10" height="10" rx="2" fill="#ffffff" />
      <circle cx="14" cy="33" r="1.1" fill="#111111" stroke="none" />
      <circle cx="18" cy="33" r="1.1" fill="#111111" stroke="none" />
      
      <path d="M53 58 a7 7 0 0 0 -10 -7" />
      <rect x="43" y="28" width="10" height="10" rx="2" fill="#ffffff" />
      <circle cx="46" cy="33" r="1.1" fill="#111111" stroke="none" />
      <circle cx="50" cy="33" r="1.1" fill="#111111" stroke="none" />
    </g>

    <!-- Center Human (Leader) -->
    <g stroke-width="4">
      <path d="M22 58 a10 10 0 0 1 20 0" />
      <circle cx="32" cy="18" r="9" fill="#ffffff" />
      <!-- Human Eyes -->
      <circle cx="29" cy="18" r="1.8" fill="#111111" stroke="none" />
      <circle cx="35" cy="18" r="1.8" fill="#111111" stroke="none" />
    </g>
    
  </g>
</svg>
